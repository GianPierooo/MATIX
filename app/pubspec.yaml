name: matix
description: "Matix - asistente personal y centro de mando"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.2.2

  # State management (patrón clásico, sin codegen — ver decisión
  # 2026-05-25 en docs/ESTADO.md).
  flutter_riverpod: ^2.6.1

  # Formato de fechas y números en es-PE.
  intl: ^0.20.2

  # Gráficos del dashboard de Finanzas (Finanzas-3): torta de gastos por
  # categoría y barras de ingresos vs gastos por mes. Solo visualización
  # sobre los movimientos que ya se registran.
  fl_chart: ^0.69.0

  # Notificaciones locales programadas (Paso 11).
  # Necesita `timezone` para programar en hora local del usuario y
  # convertir a UTC al guardar.
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  # Zona horaria REAL del dispositivo para programar notificaciones en la
  # hora local correcta (no hardcodear America/Lima).
  flutter_timezone: ^3.0.1

  # Voz de entrada para Matix (Capa 2 Paso 3): grabar audio AAC/m4a
  # y pedir permiso de micrófono en runtime.
  record: ^5.2.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.5

  # Voz de salida (Capa 2 Paso 4 → 5.1): pasamos de `flutter_tts`
  # (motor del teléfono, voces robóticas o solo femeninas en el
  # Huawei del usuario) a la TTS de OpenAI vía el cerebro. Voz
  # masculina `onyx`. `audioplayers` reproduce los mp3 que devuelve
  # el endpoint `/api/v1/matix/voz`.
  audioplayers: ^6.1.0

  # Respaldos NATIVOS de voz (Capa de resiliencia multi-proveedor): si la TTS
  # en la nube (OpenAI/ElevenLabs vía cerebro) no está disponible, hablamos con
  # la voz del dispositivo (flutter_tts) como piso siempre disponible. Y si
  # Whisper no responde, dictamos con el reconocimiento de voz nativo de Android
  # (speech_to_text). Así voz y dictado no mueren por falta de OpenAI.
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0

  # Firebase: `core` + `messaging` (Push Capa 1). Los OEM (Honor/Huawei)
  # matan las notificaciones locales programadas en segundo plano, así que
  # los recordatorios pasan a push vía FCM. La distribución sigue por
  # /api/v1/version (no por Firebase App Distribution).
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.3

  # Auto-actualización (Infra · Capa 2 / Capa 3).
  # El APK se baja desde el navegador del sistema (url_launcher, más
  # abajo). Antes usábamos `ota_update` para instalar in-app, pero su
  # instalador crasheaba de forma nativa en el Huawei sin Google Play
  # Services: invoca un FileProvider que ni el plugin ni la app
  # declaran, y la `IllegalArgumentException` resultante (no atrapada,
  # en el main looper) mataba el proceso. La vía del navegador es la
  # probada en ese device. `package_info_plus` queda por si más
  # adelante se necesita leer la versión local (hoy el build viene por
  # --dart-define, ver lib/config.dart).
  package_info_plus: ^8.1.2

  # OAuth Google (Capa 4 Paso 1) + descarga del APK de actualización:
  # abrimos URLs en el navegador del sistema. El callback de OAuth
  # vuelve al cerebro y el usuario vuelve a la app a mano; el APK se
  # baja y se instala desde el navegador (fuente de instalación).
  url_launcher: ^6.3.1

  # Capa 8 reducida Paso 1: preferencia local del briefing matutino
  # (switch on/off + hora + minuto). Es estado de dispositivo, no
  # del hub — por eso no va a Supabase.
  shared_preferences: ^2.3.3

  # Capa 7 Paso 1: cámara + galería para apunte desde foto. Cubre
  # los dos picks con un solo plugin (más simple que `camera`).
  image_picker: ^1.1.2

  # Capa 7-A: cámara con preview en vivo (`camera`) + OCR on-device
  # (`google_mlkit_text_recognition`). Es un flujo NUEVO y aparte del
  # de foto→apunte (que sube la imagen a OpenAI): acá la imagen NO sale
  # del teléfono — ML Kit corre el reconocimiento de texto local, con
  # el modelo latino empaquetado. Usamos `camera` (no image_picker)
  # porque queremos preview en vivo y disparo desde la propia pantalla.
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.1

  # Menú de adjuntar del chat (tipo WhatsApp). Ambos usan los selectores
  # NATIVOS del sistema (intents), sin permisos peligrosos — vía probada en
  # el Huawei sin Google Play:
  #  - file_picker: documento (PDF/DOCX/TXT/MD) y audio, vía Storage Access
  #    Framework (el selector de archivos del sistema).
  #  - flutter_contacts: solo `openExternalPick()` (el picker de contactos
  #    del sistema). NO pedimos READ_CONTACTS ni leemos la agenda completa.
  file_picker: ^8.1.6
  flutter_contacts: ^1.1.9+2

  # Wake word on-device (Capa 2 · "oye Matix", paso 1 = tubería con modelo
  # pre-entrenado). Corremos la cadena ONNX de openWakeWord
  # (melspectrograma → embedding → clasificador) directamente en Dart, sin
  # servicio nativo Kotlin: para v1 (solo con la app abierta) el cómputo es
  # mínimo (~12.5 inferencias/s sobre modelos diminutos) y el trabajo nativo
  # corre por method channel, fuera del hilo de UI. flutter_onnxruntime trae
  # ONNX Runtime 1.22 (compatible con el page size de 16 KB). El micro en
  # streaming PCM16 16 kHz lo da `record` (ya arriba) vía startStream.
  flutter_onnxruntime: ^1.7.1

  # Widgets de pantalla de inicio (Android): "Próximo" y "Hoy".
  #  - home_widget: puente Flutter↔widget nativo. La app EMPUJA el plan del día
  #    (ya determinista) al almacenamiento del widget y dispara el refresco; el
  #    widget nativo (RemoteViews) solo lee y renderiza — sin lógica de negocio.
  #  - workmanager: refresco periódico en background (intervalo sensato, no
  #    agresivo) para mantener "Próximo/Hoy" frescos aunque la app esté cerrada.
  home_widget: ^0.7.0
  workmanager: ^0.9.0+3

dependency_overrides:
  # `record 5.2.1` resuelve `record_linux 0.7.2`, que está fuera de
  # sync con el `record_platform_interface 1.6.0` que pide el resto
  # del paquete (le falta `startStream`, `hasPermission` con la
  # firma nueva). Aunque solo construyamos Android, Dart compila
  # todos los plugins, así que el desfasaje rompe el build.
  # Forzamos `record_linux 1.3.1` que sí está alineado contra el
  # platform_interface ≥ 1.5. Quitar cuando `record` actualice su
  # resolución.
  record_linux: 1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Para testear el diálogo de auto-actualización: el test sustituye
  # `UrlLauncherPlatform.instance` por un fake que registra la URL y
  # el modo de lanzamiento, sin tocar el method channel. Son deps
  # transitivas de url_launcher; las declaramos directas solo para
  # el test (evita el lint depend_on_referenced_packages).
  url_launcher_platform_interface: ^2.3.2
  plugin_platform_interface: ^2.1.8

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Modelos ONNX de openWakeWord. La cadena compartida (melspectrograma +
  # embedding) viene de la release v0.5.1 del repo dscripka/openWakeWord; el
  # clasificador es "oye_matix.onnx", entrenado en español con openWakeWord
  # (misma interfaz [1,16,96] -> [1,1]). Se conserva "hey_jarvis_v0.1.onnx" como
  # respaldo de la palabra de prueba en inglés.
  assets:
    - assets/models/wakeword/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
