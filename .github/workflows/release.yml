# Gate de calidad (flutter analyze + flutter test + tests puros del cerebro)
# + Build APK release + publicar en Supabase Storage + registrar versión.
#
# El gate corre en CADA push (y en PRs), no solo el build. El APK NO se
# construye ni publica si el gate falla: `build-and-publish` depende de los
# jobs `gate-flutter`, `gate-cerebro` y `gate-agente-pc`. Así la calidad se
# enforza sin importar desde qué máquina se codee.
#
# - gate-flutter: `flutter analyze` + `flutter test` en app/. Sin secretos.
# - gate-cerebro: tests PUROS del cerebro (Python + uv). Sin secretos ni BD:
#   los de integración (pytest contra Supabase) NO corren en CI — el conftest
#   los omite sin `cerebro/.env.test`. Un SUPABASE_URL dummy (no secreto) basta
#   para que la app importe.
# - gate-agente-pc: tests del agente local (Python + uv) — rails de seguridad
#   (allowlist/denylist), registry y la acción listar_carpeta. Sin secretos.
# - build-and-publish: solo en push y solo si cambió app/** (evita republicar
#   un APK idéntico en cambios solo-cerebro). Los secretos del build siguen
#   viniendo de GitHub Secrets.
#
# Secrets requeridos (SOLO para el build, no para el gate):
#
#   MATIX_API_URL                 URL pública del cerebro en Railway.
#   MATIX_API_KEY                 token X-Matix-Key del cerebro.
#   GOOGLE_SERVICES_JSON_B64      contenido de google-services.json
#                                 (firebase_core sigue compilando aunque
#                                 ya no lo usemos para distribución).
#   SUPABASE_URL                  https://<ref>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY     service role (bypassa RLS y permite
#                                 subir a Storage + insertar en BD).

name: CI · gate (analyze + tests) + Release APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'cerebro/**'
      - 'agente_pc/**'
      - '.github/workflows/release.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'cerebro/**'
      - 'agente_pc/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  # ── Detecta qué cambió, para no republicar el APK en cambios solo-cerebro ──
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.decide.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            app:
              - 'app/**'
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
          else
            echo "app=${{ steps.filter.outputs.app }}" >> "$GITHUB_OUTPUT"
          fi

  # ── GATE 1: análisis estático + tests de la app Flutter ──────────────────
  gate-flutter:
    name: Gate · app (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Flutter pub get
        working-directory: app
        run: flutter pub get
      - name: Flutter analyze
        working-directory: app
        # Fatal en errores y WARNINGS (bugs reales) pero NO en los `info` de
        # deprecación: el canal `stable` de Flutter introduce avisos de
        # deprecación con cada release y, fatales, romperían el gate sin que
        # nadie haya tocado nada. El gate sigue siendo real (bloquea bugs).
        run: flutter analyze --no-fatal-infos
      - name: Flutter test
        working-directory: app
        run: flutter test

  # ── GATE 2: tests PUROS del cerebro (sin BD; integración se omite) ────────
  gate-cerebro:
    name: Gate · cerebro (tests puros)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: uv sync (deps + dev)
        working-directory: cerebro
        run: uv sync
      - name: Pytest (solo puros; integración se omite sin .env.test)
        working-directory: cerebro
        env:
          # Dummy NO secreto: solo para que pydantic-settings (Settings) pueda
          # importar la app. Los tests puros no tocan Supabase; los de
          # integración hacen skip sin cerebro/.env.test.
          SUPABASE_URL: https://ci.invalid
        run: uv run pytest -q

  # ── GATE 3: tests del agente local de la PC (Python + uv) ────────────────
  # Rails de seguridad (allowlist/denylist), registry y acción listar_carpeta.
  # El límite de seguridad del agente se verifica en CADA push.
  gate-agente-pc:
    name: Gate · agente PC (tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: uv sync (deps + dev)
        working-directory: agente_pc
        run: uv sync
      - name: Pytest (seguridad + registry + acciones)
        working-directory: agente_pc
        run: uv run pytest -q

  build-and-publish:
    needs: [changes, gate-flutter, gate-cerebro, gate-agente-pc]
    # Solo construye/publica en push (no en PRs) y solo si cambió la app.
    if: github.event_name != 'pull_request' && needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
          key: pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: pub-

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Decode google-services.json
        run: |
          mkdir -p app/android/app
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > app/android/app/google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}

      # Firma de release ESTABLE. Antes, sin estos secrets, Gradle
      # firmaba el release con la debug keystore de cada VM del CI,
      # distinta en cada run. Resultado: APKs con firma diferente, y
      # las OTA fallaban silenciosamente al instalar (el sistema
      # rechaza updates con cambio de firma). Con un keystore propio
      # guardado como secret + key.properties generado acá, todos los
      # APKs salen firmados igual y las OTA fluyen.
      - name: Decode keystore + key.properties
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          STORE_PW: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_B64 vacío. La build NO va a firmarse con llave estable."
            exit 1
          fi
          echo "$KS_B64" | base64 -d > app/android/app/matix-release.jks
          cat > app/android/key.properties <<EOF
          storeFile=app/matix-release.jks
          storePassword=$STORE_PW
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PW
          EOF
          # Sanity: confirmar que keytool ve el alias correctamente
          # ANTES de buildear (mejor fallar acá con mensaje claro).
          keytool -list -keystore app/android/app/matix-release.jks \
            -storepass "$STORE_PW" -alias "$KEY_ALIAS" > /dev/null
          echo "✓ Keystore válido · alias=$KEY_ALIAS"

      # build_number = GITHUB_RUN_NUMBER. Monótono creciente; la app
      # lo lee local con package_info_plus y lo compara contra el de
      # /api/v1/version para decidir si hay update.
      #
      # --split-per-abi genera 3 APKs (armeabi-v7a, arm64-v8a, x86_64).
      # Sin split, el universal APK pesa ~54 MB y supera el tope del
      # plan free de Supabase Storage (50 MB). Cada ABI por separado
      # pesa ~25-30 MB y cabe holgado. Subimos el arm64-v8a (el que
      # usa el Huawei del usuario y la gran mayoría de Androids
      # modernos). Si en el futuro queremos cubrir más devices,
      # subimos los 3 y la app pide el suyo.
      - name: Build APK release (split-per-abi)
        working-directory: app
        run: |
          # --build-number setea el versionCode del manifest.
          # --dart-define MATIX_BUILD_NUMBER inyecta el mismo número
          # como constante de compile-time leíble desde Dart. Lo
          # segundo es lo que usa el UpdateService para comparar
          # contra /version: el manifest, con --split-per-abi, viene
          # con versionCode mutado (multiplicado por 1000 + offset
          # de ABI), por eso no se puede usar.
          flutter build apk --release --split-per-abi \
            --build-number=$BUILD_NUMBER \
            --dart-define=MATIX_API_URL="$MATIX_API_URL" \
            --dart-define=MATIX_API_KEY="$MATIX_API_KEY" \
            --dart-define=MATIX_ENV=prod \
            --dart-define=MATIX_BUILD_NUMBER=$BUILD_NUMBER
          ls -la build/app/outputs/flutter-apk/
        env:
          MATIX_API_URL: ${{ secrets.MATIX_API_URL }}
          MATIX_API_KEY: ${{ secrets.MATIX_API_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Extraer version del pubspec
        id: pubver
        run: |
          # pubspec: `version: 1.0.0+1` → quedamos con "1.0.0".
          V=$(grep -E '^version:' app/pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Preparar release notes
        id: notes
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          SHA: ${{ github.sha }}
        run: |
          if [ -n "$COMMIT_MSG" ]; then
            # Solo la primera línea (la línea de tema) — la app
            # muestra esto en el diálogo, no queremos un párrafo largo.
            FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
            echo "first_line=$FIRST_LINE" >> "$GITHUB_OUTPUT"
            echo "full_notes<<MATIX_EOF" >> "$GITHUB_OUTPUT"
            echo "$COMMIT_MSG" >> "$GITHUB_OUTPUT"
            echo 'MATIX_EOF' >> "$GITHUB_OUTPUT"
          else
            echo "first_line=Build manual" >> "$GITHUB_OUTPUT"
            echo "full_notes=Build manual ($SHA)" >> "$GITHUB_OUTPUT"
          fi

      # Subimos el APK al bucket público `apks` de Supabase Storage.
      # Path = matix-<build>-<sha7>.apk → estable por build, único.
      - name: Subir APK a Supabase Storage
        id: upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        run: |
          SHA7="${SHA:0:7}"
          OBJ="matix-${BUILD_NUMBER}-${SHA7}.apk"
          echo "Subiendo $OBJ ..."
          APK_PATH="app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          ls -la "$APK_PATH"
          HTTP_CODE=$(curl -s -o /tmp/upload.log -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary "@$APK_PATH" \
            "$SUPABASE_URL/storage/v1/object/apks/$OBJ")
          echo "HTTP $HTTP_CODE"
          cat /tmp/upload.log
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Upload falló" >&2
            exit 1
          fi
          APK_URL="$SUPABASE_URL/storage/v1/object/public/apks/$OBJ"
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"
          echo "✓ APK público: $APK_URL"

      # Insertamos la fila en `app_versions`. PostgREST cast-ea el
      # body JSON directo.
      - name: Registrar version en BD
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.pubver.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          APK_URL: ${{ steps.upload.outputs.apk_url }}
          NOTAS: ${{ steps.notes.outputs.first_line }}
          SHA: ${{ github.sha }}
        run: |
          # Construimos el JSON con Python para que escape comillas y
          # caracteres especiales del mensaje de commit correctamente.
          PAYLOAD=$(python3 -c "
          import json, os
          print(json.dumps({
              'version': os.environ['VERSION'],
              'build_number': int(os.environ['BUILD_NUMBER']),
              'apk_url': os.environ['APK_URL'],
              'notas': os.environ['NOTAS'],
              'sha': os.environ['SHA'],
          }))
          ")
          HTTP_CODE=$(curl -s -o /tmp/insert.log -w "%{http_code}" \
            -X POST \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            "$SUPABASE_URL/rest/v1/app_versions" \
            -d "$PAYLOAD")
          echo "HTTP $HTTP_CODE"
          cat /tmp/insert.log
          if [ "$HTTP_CODE" != "201" ]; then
            echo "INSERT falló" >&2
            exit 1
          fi
          echo "✓ Versión $VERSION build $BUILD_NUMBER registrada"
