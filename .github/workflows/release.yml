# Build APK release + publicar en Supabase Storage + registrar versión
#
# Reemplazó (Capa Infra · Auto-actualización in-app) a Firebase App
# Distribution. La app se autoactualiza consultando `/api/v1/version`
# del cerebro, que apunta al APK público en Supabase Storage.
#
# Secrets requeridos:
#
#   MATIX_API_URL                 URL pública del cerebro en Railway.
#   MATIX_API_KEY                 token X-Matix-Key del cerebro.
#   GOOGLE_SERVICES_JSON_B64      contenido de google-services.json
#                                 (firebase_core sigue compilando aunque
#                                 ya no lo usemos para distribución).
#   SUPABASE_URL                  https://<ref>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY     service role (bypassa RLS y permite
#                                 subir a Storage + insertar en BD).

name: Release APK · publica versión

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
          key: pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: pub-

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Decode google-services.json
        run: |
          mkdir -p app/android/app
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > app/android/app/google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}

      # build_number = GITHUB_RUN_NUMBER. Monótono creciente; la app
      # lo lee local con package_info_plus y lo compara contra el de
      # /api/v1/version para decidir si hay update.
      - name: Build APK release
        working-directory: app
        run: |
          flutter build apk --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=MATIX_API_URL="$MATIX_API_URL" \
            --dart-define=MATIX_API_KEY="$MATIX_API_KEY" \
            --dart-define=MATIX_ENV=prod
        env:
          MATIX_API_URL: ${{ secrets.MATIX_API_URL }}
          MATIX_API_KEY: ${{ secrets.MATIX_API_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Extraer version del pubspec
        id: pubver
        run: |
          # pubspec: `version: 1.0.0+1` → quedamos con "1.0.0".
          V=$(grep -E '^version:' app/pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Preparar release notes
        id: notes
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          SHA: ${{ github.sha }}
        run: |
          if [ -n "$COMMIT_MSG" ]; then
            # Solo la primera línea (la línea de tema) — la app
            # muestra esto en el diálogo, no queremos un párrafo largo.
            FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
            echo "first_line=$FIRST_LINE" >> "$GITHUB_OUTPUT"
            echo "full_notes<<MATIX_EOF" >> "$GITHUB_OUTPUT"
            echo "$COMMIT_MSG" >> "$GITHUB_OUTPUT"
            echo 'MATIX_EOF' >> "$GITHUB_OUTPUT"
          else
            echo "first_line=Build manual" >> "$GITHUB_OUTPUT"
            echo "full_notes=Build manual ($SHA)" >> "$GITHUB_OUTPUT"
          fi

      # Subimos el APK al bucket público `apks` de Supabase Storage.
      # Path = matix-<build>-<sha7>.apk → estable por build, único.
      - name: Subir APK a Supabase Storage
        id: upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        run: |
          SHA7="${SHA:0:7}"
          OBJ="matix-${BUILD_NUMBER}-${SHA7}.apk"
          echo "Subiendo $OBJ ..."
          HTTP_CODE=$(curl -s -o /tmp/upload.log -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary "@app/build/app/outputs/flutter-apk/app-release.apk" \
            "$SUPABASE_URL/storage/v1/object/apks/$OBJ")
          echo "HTTP $HTTP_CODE"
          cat /tmp/upload.log
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Upload falló" >&2
            exit 1
          fi
          APK_URL="$SUPABASE_URL/storage/v1/object/public/apks/$OBJ"
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"
          echo "✓ APK público: $APK_URL"

      # Insertamos la fila en `app_versions`. PostgREST cast-ea el
      # body JSON directo.
      - name: Registrar version en BD
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.pubver.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          APK_URL: ${{ steps.upload.outputs.apk_url }}
          NOTAS: ${{ steps.notes.outputs.first_line }}
          SHA: ${{ github.sha }}
        run: |
          # Construimos el JSON con Python para que escape comillas y
          # caracteres especiales del mensaje de commit correctamente.
          PAYLOAD=$(python3 -c "
          import json, os
          print(json.dumps({
              'version': os.environ['VERSION'],
              'build_number': int(os.environ['BUILD_NUMBER']),
              'apk_url': os.environ['APK_URL'],
              'notas': os.environ['NOTAS'],
              'sha': os.environ['SHA'],
          }))
          ")
          HTTP_CODE=$(curl -s -o /tmp/insert.log -w "%{http_code}" \
            -X POST \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            "$SUPABASE_URL/rest/v1/app_versions" \
            -d "$PAYLOAD")
          echo "HTTP $HTTP_CODE"
          cat /tmp/insert.log
          if [ "$HTTP_CODE" != "201" ]; then
            echo "INSERT falló" >&2
            exit 1
          fi
          echo "✓ Versión $VERSION build $BUILD_NUMBER registrada"

      - name: Subir APK como artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
